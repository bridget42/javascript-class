<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for the page -->
    <meta charset="UTF-8">
    <!-- Viewport settings for responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title shown in browser tab -->
    <title>Products Store - Higher-Order Functions Demo</title>
    
    <!-- Bootstrap 5 CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom style for products container -->
    <style>
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        #products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Main heading -->
    <h1>🛍️ Products Gallery (Using Higher-Order Functions)</h1>
    
    <!-- Container where products will be displayed -->
    <!-- JavaScript will insert product cards here using the map higher-order function -->
    <div id="products"></div>
    
    <!-- Bootstrap JS bundle for interactive features -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Load the products.js file which contains the higher-order function logic -->
    <script src="products.js"></script> 
</body>
</html>
